<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tarkratt - AI in plain words</title>
    <meta name="description" content="Tarkratt - AI in plain words. AI practice room, personal training and consulting in Tallinn, Estonia. Part of Undercover, the clubhouse for entrepreneurs." />
    <script>
      // Apply persisted theme before React mounts to avoid a flash.
      // Default is light - only dark needs the class.
      (function () {
        try {
          if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) { /* ignore */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
